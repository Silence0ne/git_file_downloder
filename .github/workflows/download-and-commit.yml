name: Download file (zip or apt) and commit

on:
  workflow_dispatch:
    inputs:
      file_url:
        description: "لینک فایل مورد نظر"
        required: true
      file_type:
        description: "نوع فایل (zip یا apt)"
        required: true
        type: choice
        options:
          - zip
          - apt

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Extract filename and set output paths
        id: vars
        run: |
          URL="${{ github.event.inputs.file_url }}"
          TYPE="${{ github.event.inputs.file_type }}"

          FILENAME=$(basename "$URL")

          if [ "$TYPE" = "zip" ]; then
            OUTDIR="zipfiles"
          else
            OUTDIR="aptfiles"
          fi

          mkdir -p "$OUTDIR"

          echo "FILENAME=$FILENAME" >> $GITHUB_OUTPUT
          echo "OUTDIR=$OUTDIR" >> $GITHUB_OUTPUT
          echo "FULLPATH=$OUTDIR/$FILENAME" >> $GITHUB_OUTPUT

      - name: Download file
        run: |
          URL="${{ github.event.inputs.file_url }}"
          PATHOUT="${{ steps.vars.outputs.FULLPATH }}"

          echo "Downloading: $URL"
          curl -L "$URL" -o "$PATHOUT"

          echo "Saved file to $PATHOUT"

      - name: Git config
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit if changed
        run: |
          FILE="${{ steps.vars.outputs.FULLPATH }}"

          if git diff --quiet "$FILE"; then
            echo "No changes to commit."
            exit 0
          fi

          git add "$FILE"
          git commit -m "Downloaded new ${{ github.event.inputs.file_type }} file: $FILE"

      - name: Push changes
        run: git push
