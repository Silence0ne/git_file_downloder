name: Download by Type (zip/apt) and Commit

on:
  workflow_dispatch:
    inputs:
      file_url:
        description: "🔗 لینک فایل"
        required: true
        type: string
      file_type:
        description: "📦 نوع فایل"
        required: true
        type: choice
        options:
          - zip
          - apt
        default: zip

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Prepare paths
        id: prep
        run: |
          URL="${{ github.event.inputs.file_url }}"
          TYPE="${{ github.event.inputs.file_type }}"
          NAME=$(basename "$URL")

          if [ "$TYPE" = "zip" ]; then
            DIR="zipfiles"
          else
            DIR="aptfiles"
          fi

          mkdir -p "$DIR"
          
          echo "FILENAME=$NAME" >> $GITHUB_OUTPUT
          echo "OUTDIR=$DIR" >> $GITHUB_OUTPUT
          echo "FULLPATH=$DIR/$NAME" >> $GITHUB_OUTPUT

      - name: Download file
        run: |
          URL="${{ github.event.inputs.file_url }}"
          OUT="${{ steps.prep.outputs.FULLPATH }}"

          echo "Downloading: $URL"
          curl -L "$URL" -o "$OUT"

          echo "Saved to $OUT"

      - name: Commit & Push
        run: |
          echo "📦 Preparing commit and push..."

          git config user.name "github-actions[bot]"
          git config user.email "bot@github.com"

          echo "📁 Adding all changed files..."
          git add -A

          CHANGES=$(git diff --cached --name-only | wc -l)

          if [ "$CHANGES" -eq 0 ]; then
            echo "❌ No new changes"
            exit 0
          fi

          echo "📝 Committing..."
          git commit -m "Added new ${{ github.event.inputs.file_type }}: ${{ steps.prep.outputs.FILENAME }}" --quiet

          echo "🚀 Pushing changes..."
          # Robust push (same technique from YouTube Downloader)
          for i in 1 2 3 4 5; do
            echo -n "Attempt $i/5..."
            if git pull --rebase --quiet 2>/dev/null && git push --quiet 2>/dev/null; then
              echo " Success!"
              exit 0
            fi
            echo " Failed."
            git rebase --abort 2>/dev/null
            [ $i -lt 5 ] && sleep $((i*3))
          done

          echo "❌ Push failed after several attempts"
          exit 1
